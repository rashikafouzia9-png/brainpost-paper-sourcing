name: Weekly Paper Digest

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit updated digest
        run: |
          git config user.name "brainpost-bot"
          git config user.email "actions@github.com"
          git add digest.md
          git diff --cached --quiet || git commit -m "Update weekly paper digest"
          git push
